name: CTFTime

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache CTFTime
        uses: actions/cache@v4
        with:
          path: ctftime_cache
          key: ${{ runner.os }}-ctftime-${{ hashFiles('ctftime_cache') }}
          restore-keys: |
            ${{ runner.os }}-ctftime-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies and run
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DiscordWebhookUrl }}
        run: |
          python -m pip install --upgrade pip
          pip install -r CTFtime-Discord-hooks/requirements.txt
          python CTFtime-Discord-hooks/CTFtimeDiscordHooks.py \
            -w "$DISCORD_WEBHOOK_URL" \
            -d 10 \
            -c ctftime_cache
